name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Run Pytest Suite
      run: |
        PYTHONPATH=backend pytest backend/tests/

  # NOTE: the old deploy-github-pages job (which pushed the legacy frontend/
  # prototype to gh-pages on every main push) has been removed. gh-pages now
  # holds a hand-maintained landing page that links to the Render-hosted app;
  # the app itself deploys via render.yaml (Deploy-to-Render button).
